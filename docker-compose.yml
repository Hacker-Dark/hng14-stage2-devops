version: "3.9"

networks:
  internal:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  api:
    build: ./api
    networks:
      - internal
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - PORT=${PORT:-8000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  worker:
    build: ./worker
    networks:
      - internal
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - PORT=${PORT:-8000}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  frontend:
    build: ./frontend
    networks:
      - internal
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 20s  # Increased from 10s to 20s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M