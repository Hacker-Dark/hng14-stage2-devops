name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: localhost:5000

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python linter
        run: pip install flake8

      - name: Lint Python files
        run: |
          flake8 api/main.py --max-line-length=100
          flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Lint JavaScript files
        run: |
          cd frontend
          npx eslint app.js --rule '{"no-unused-vars": "warn"}' || true

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn redis pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          pytest api/tests/ --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: ${{ env.REGISTRY }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: ${{ env.REGISTRY }}/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Rebuild images for scanning
        run: |
          docker build -t $REGISTRY/api:latest ./api
          docker build -t $REGISTRY/worker:latest ./worker
          docker build -t $REGISTRY/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-api.sarif \
            $REGISTRY/api:latest

      - name: Scan worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-worker.sarif \
            $REGISTRY/worker:latest

      - name: Scan frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-frontend.sarif \
            $REGISTRY/frontend:latest

      - name: Upload Trivy results
        uses: actions/upload-artifact@v3
        with:
          name: trivy-results
          path: "*.sarif"

  integration-test:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API health check
        run: |
          for i in $(seq 1 10); do
            curl -f http://localhost:3000/health && break
            sleep 5
          done

      - name: Submit job and verify completion
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json")

          echo "Response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")

          for i in $(seq 1 20); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")

            echo "Attempt $i - Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi

            sleep 3
          done

          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down

  deploy:
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Rolling deploy
        run: |
          docker compose build

          docker compose up -d --no-deps --build api

          for i in $(seq 1 12); do
            STATUS=$(docker inspect \
              --format='{{.State.Health.Status}}' \
              $(docker compose ps -q api) 2>/dev/null || echo "starting")

            echo "Health check attempt $i: $STATUS"

            if [ "$STATUS" = "healthy" ]; then
              docker compose up -d --no-deps --build worker
              docker compose up -d --no-deps --build frontend
              exit 0
            fi

            sleep 5
          done

          exit 1